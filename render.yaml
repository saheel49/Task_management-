# Render deployment configuration for Django app.
#
# Two deployment modes are supported:
# 1. Native Python (recommended for simplicity) — uncomment `runtime: python-3.14`
#    and comment out `runtime: docker`.
# 2. Docker — uses the Dockerfile in this repo.
#
# For Docker deployments on Render, push this file to the default branch. Render will
# automatically detect it. You must set the Release Command and Start Command in the
# Render dashboard (or let this file override them):
#   Release Command: python manage.py migrate --noinput
#   Start Command:    gunicorn config.wsgi:application --log-file -

services:
  - type: web
    name: django-app
    # runtime: python-3.14
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Build Command is ignored for Docker; the image is built from the Dockerfile.
    buildCommand: echo "Skipping build command for Docker deployment"
    # Start command overrides the Dockerfile CMD. The Docker entrypoint script
    # handles migrations, collectstatic, and database readiness before executing this command.
    startCommand: gunicorn config.wsgi:application --log-file -
    # Release command runs once per deploy in an ephemeral container *after* the
    # image is built but *before* any web instances are started. Kept as a safety net;
    # the web container's entrypoint also runs migrations.
    releaseCommand: python manage.py migrate --noinput
    # Post-deploy command runs after the web service is healthy. This seeds the
    # initial admin superuser so you can log in with the same credentials locally
    # and in production.
    postDeployCommand: python manage.py create_admin_superuser
    # Health check path — create this endpoint if you want Render to detect crashes
    # healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: django-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: django-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: PROJECT_URL
        # Set this to your Render domain, e.g. https://your-app.onrender.com
        # This ensures django.contrib.sites creates the correct domain on first deploy.
        value: https://your-app.onrender.com
      - key: ADMIN_EMAIL
        value: saheelamir49@gmail.com
      - key: ADMIN_FIRST_NAME
        value: Admin
      - key: ADMIN_LAST_NAME
        value: User
      # Set ADMIN_PASSWORD to match your local dev credentials.
      # If unset, it defaults to "admin".
      - key: ADMIN_PASSWORD
        value: admin
      # Default employee user (optional). If both EMPLOYEE_EMAIL and EMPLOYEE_PASSWORD
      # are set, the post-deploy command will create/update this user as well.
      - key: EMPLOYEE_EMAIL
        value: employee@test.com
      - key: EMPLOYEE_PASSWORD
        value: employee123
      - key: EMPLOYEE_FIRST_NAME
        value: Employee
      - key: EMPLOYEE_LAST_NAME
        value: User

      # --- Email Configuration (Anymail + SendGrid) ---------------------------
      # RENDER FREE TIER LIMITATION: Outbound SMTP (ports 25/465/587) is blocked.
      # Use Anymail + SendGrid API instead. SendGrid free tier: 100 emails/day.
      # 1. Sign up at https://sendgrid.com (free)
      # 2. Create API key with "Mail Send" permissions
      # 3. Update SENDGRID_API_KEY below
      #
      # To switch back to SMTP (requires Render paid tier for outbound SMTP):
      # - Set EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      # - Set EMAIL_HOST, EMAIL_PORT, EMAIL_HOST_USER, EMAIL_HOST_PASSWORD
      - key: EMAIL_BACKEND
        value: anymail.backends.sendgrid.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: saheelamir49@gmail.com
      - key: SERVER_EMAIL
        value: saheelamir49@gmail.com
      - key: SENDGRID_API_KEY
        value: SG.xxxxxxxx
