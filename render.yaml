# Render deployment configuration for Django app.
#
# Two deployment modes are supported:
# 1. Native Python (recommended for simplicity) — uncomment `runtime: python-3.14`
#    and comment out `runtime: docker`.
# 2. Docker — uses the Dockerfile in this repo.
#
# For Docker deployments on Render, push this file to the default branch. Render will
# automatically detect it. You must set the Release Command and Start Command in the
# Render dashboard (or let this file override them):
#   Release Command: python manage.py migrate --noinput
#   Start Command:    gunicorn config.wsgi:application --log-file -

services:
  - type: web
    name: django-app
    # runtime: python-3.14
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Build Command is ignored for Docker; the image is built from the Dockerfile.
    buildCommand: echo "Skipping build command for Docker deployment"
    # Start command overrides the Dockerfile CMD. The Docker entrypoint script
    # handles migrations, collectstatic, and database readiness before executing this command.
    startCommand: gunicorn config.wsgi:application --log-file -
    # Release command runs once per deploy in an ephemeral container *after* the
    # image is built but *before* any web instances are started. Kept as a safety net;
    # the web container's entrypoint also runs migrations.
    releaseCommand: python manage.py migrate --noinput
    # Health check path — create this endpoint if you want Render to detect crashes
    # healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: django-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: django-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: PROJECT_URL
        # Set this to your Render domain, e.g. https://your-app.onrender.com
        # This ensures django.contrib.sites creates the correct domain on first deploy.
        value: https://your-app.onrender.com
